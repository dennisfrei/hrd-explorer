<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HR Diagram Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div id="app">
  <header id="header">
    <h1>HR Diagram Explorer</h1>
    <div class="hsep"></div>
    <button class="hbtn on" id="btn-explore">Explore</button>
    <button class="hbtn" id="btn-compare">Compare</button>
  </header>

  <!-- content-area holds the HRD canvas, resize handle, and info panel side by side -->
  <div id="content-area">
    <div id="hrd-wrap"><canvas id="hrd-canvas"></canvas></div>
    <div id="drag-handle"></div>
    <div id="rpanel">
      <button id="close-panel" aria-label="Close">×</button>
      <div id="star-preview">
        <canvas id="star-canvas"></canvas>
        <div id="star-label">click the diagram or select a star</div>
        <button id="scale-toggle">log scale</button>
      </div>
      <div id="dpanel">
        <div class="dg">
          <div class="dgt">Spectral Classification</div>
          <div class="dr"><span class="dl">Type</span><span class="dv big" id="v-spec">—</span></div>
          <div class="dr"><span class="dl">Luminosity class</span><span class="dv" id="v-lum">—</span></div>
        </div>
        <div class="dg">
          <div class="dgt">Physical Parameters</div>
          <div class="dr"><span class="dl">T_eff</span><span class="dv" id="v-teff">—</span></div>
          <div class="dr"><span class="dl">log(L / L☉)</span><span class="dv" id="v-logl">—</span></div>
          <div class="dr"><span class="dl">Radius R / R☉</span><span class="dv" id="v-rad">—</span></div>
          <div class="dr"><span class="dl">λ_max</span><span class="dv" id="v-lmax">—</span></div>
        </div>
        <div class="dg">
          <div class="dgt">Main Sequence (ZAMS only)</div>
          <div class="dr"><span class="dl">Mass M / M☉</span><span class="dv" id="v-mass">—</span></div>
          <div class="dr"><span class="dl">MS lifetime</span><span class="dv" id="v-life">—</span></div>
        </div>
        <div class="dg">
          <div class="dgt">Diagram Layers</div>
          <div class="lbtns">
            <button class="lbtn on" id="l-radius">R isolines</button>
            <button class="lbtn on" id="l-zams">ZAMS</button>
            <button class="lbtn on" id="l-regions">Regions</button>
            <button class="lbtn on" id="l-stars">Known stars</button>
            <button class="lbtn" id="l-color">Color HRD</button>
          </div>
          <div id="cmp-note">Click a second point to compare sizes.</div>
        </div>
      </div>
      <div id="slist">
        <div class="slt">Known Stars</div>
        <div id="slist-items-desktop"></div>
      </div>
    </div>
  </div>

  <!-- Stars tab pane — mobile only, full-screen list -->
  <div id="slist-wrap">
    <div class="slt">Known Stars</div>
    <div id="slist-items-mobile"></div>
  </div>

  <!-- Tab bar — mobile only, 2 tabs -->
  <nav id="tab-bar">
    <button class="tab-btn on" id="tab-diagram" aria-label="Diagram">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.4">
        <rect x="2" y="2" width="14" height="14" rx="1"/>
        <polyline points="5,13 7,9 10,11 13,6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Diagram
    </button>
    <button class="tab-btn" id="tab-stars" aria-label="Stars">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.4">
        <polygon points="9,2.5 10.8,7.2 15.8,7.2 11.8,10.2 13.3,15 9,12.2 4.7,15 6.2,10.2 2.2,7.2 7.2,7.2" stroke-linejoin="round"/>
      </svg>
      Stars
    </button>
  </nav>
</div>
<div id="tooltip"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
